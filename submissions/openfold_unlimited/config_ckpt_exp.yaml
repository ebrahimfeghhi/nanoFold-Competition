run_name: compile_test
track: unlimited
seed: 42

submission:
  path: submission.py

data:
  processed_features_dir: data/processed_features
  processed_labels_dir: data/processed_labels
  train_manifest: data/manifests/train.txt
  val_manifest: data/manifests/val.txt
  crop_size: 256
  msa_depth: 512
  batch_size: 1
  num_workers: 8
  train_crop_mode: random
  val_crop_mode: center
  train_msa_sample_mode: random
  val_msa_sample_mode: top

model:
  msa_depth: 128
  extra_msa_depth: 1024
  n_recycles: 3
  blocks_per_ckpt: 2

optim:
  lr: 1.0e-3
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.99
  eps: 1.0e-6
  grad_clip_norm: 0.1
  lr_decay_factor: 0.95

train:
  max_steps: 100
  log_every: 1
  eval_every: 999
  save_every: 999
  grad_accum_steps: 16
  finetune_start_step: 99999
  finetune_ramp_steps: 500
  finetune_lr_scale: 0.5
  finetune_crop_size: 384
  finetune_data_msa_depth: 2048
  finetune_model_msa_depth: 512
  finetune_extra_msa_depth: 5120
  warmup_steps: 30
  lr_decay_step: 3652
  amp: true
  eval_foldscore_components: false
